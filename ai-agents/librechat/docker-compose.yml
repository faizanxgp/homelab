# LibreChat — multi-provider chat UI (MongoDB + Meilisearch search).
# Part of the ai-agents stack. Defined but kept stopped.
# Public (when enabled) via cloudflared at librechat.itproxima.com.
name: librechat
services:
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    depends_on:
      librechat-mongo:
        condition: service_healthy
      librechat-meili:
        condition: service_started
    environment:
      HOST: 0.0.0.0
      PORT: "3080"
      MONGO_URI: "mongodb://librechat-mongo:27017/LibreChat"
      MEILI_HOST: "http://librechat-meili:7700"
      MEILI_MASTER_KEY: "${LIBRECHAT_MEILI_KEY}"
      CREDS_KEY: "${LIBRECHAT_CREDS_KEY}"                 # 32-byte hex (openssl rand -hex 32)
      CREDS_IV: "${LIBRECHAT_CREDS_IV}"                   # 16-byte hex (openssl rand -hex 16)
      JWT_SECRET: "${LIBRECHAT_JWT_SECRET}"
      JWT_REFRESH_SECRET: "${LIBRECHAT_JWT_REFRESH_SECRET}"
    volumes:
      - ./volumes/images:/app/client/public/images
      - ./volumes/logs:/app/api/logs
    ports:
      - "127.0.0.1:8513:3080"   # local test only; public via tunnel
    networks: [librechat-internal, agents, drawbridge, observatory]

  librechat-mongo:
    image: mongo:7
    container_name: librechat-mongo
    restart: unless-stopped
    command: ["mongod", "--noauth"]
    volumes:
      - ./volumes/mongo:/data/db
    networks: [librechat-internal]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  librechat-meili:
    image: getmeili/meilisearch:v1.12
    container_name: librechat-meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: "${LIBRECHAT_MEILI_KEY}"
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ./volumes/meili:/meili_data
    networks: [librechat-internal]

  librechat-mongo-exporter:
    image: percona/mongodb_exporter:0.43
    container_name: librechat-mongo-exporter
    restart: unless-stopped
    command:
      - "--mongodb.uri=mongodb://librechat-mongo:27017"
      - "--collect-all"
      - "--compatible-mode"
    depends_on:
      librechat-mongo:
        condition: service_healthy
    networks: [librechat-internal, observatory]

networks:
  librechat-internal:
    driver: bridge
  agents:
    external: true
  drawbridge:
    external: true
  observatory:
    external: true
