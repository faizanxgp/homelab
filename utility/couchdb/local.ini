; CouchDB config tuned for Obsidian "Self-hosted LiveSync".
; Loaded from /opt/couchdb/etc/local.d/ — coexists with the docker-written admin creds.
; Values mirror the canonical vrtmrz/obsidian-livesync couchdb-init settings.

[couchdb]
single_node = true            ; auto-creates _users/_replicator/_global_changes on first boot
max_document_size = 50000000  ; 50 MB — LiveSync chunks can be large

[chttpd]
bind_address = 0.0.0.0
require_valid_user = true
max_http_request_size = 4294967296   ; 4 GB

[chttpd_auth]
require_valid_user = true

[httpd]
WWW-Authenticate = Basic realm="couchdb"
enable_cors = true

[cors]
credentials = true
origins = app://obsidian.md,capacitor://localhost,http://localhost
headers = accept, authorization, content-type, origin, referer
methods = GET, PUT, POST, HEAD, DELETE
max_age = 3600
