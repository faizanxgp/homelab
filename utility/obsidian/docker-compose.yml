services:
  # Real Obsidian, rendered in the browser via KasmVNC. Runs the genuine desktop
  # app so the "Self-hosted LiveSync" community plugin works exactly like it does
  # on phone/laptop — they all replicate against the same CouchDB (couch.itproxima.com).
  obsidian:
    image: lscr.io/linuxserver/obsidian:latest
    container_name: obsidian
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined          # KasmVNC/Chromium sandbox needs this
    shm_size: "1gb"                  # Electron/Chromium shared-memory headroom
    environment:
      - PUID=0
      - PGID=0
      - TZ=Asia/Karachi
      # No inner KasmVNC login: Cloudflare Access (email OTP) is the only gate,
      # same model as uploads/db. (Set CUSTOM_USER/PASSWORD here to re-add one.)
    volumes:
      - ./volumes/config:/config                       # app data; the vault lives at /config/vault
      # Bulk folders nested under storage/ so the tree matches the desktop's WebDAV
      # mount exactly. LiveSync ignores storage/ (these never go through CouchDB).
      - ../downloads/files:/config/vault/storage/downloads   # SAME dir downloads.itproxima.com serves
      - ../uploads/files:/config/vault/storage/uploads       # SAME dir uploads.itproxima.com writes to
      - ../storage/archive:/config/vault/storage/archive     # bulk storage (OneDrive 50GB); also served over WebDAV
      # ── Claude Code config, surfaced & editable inside Obsidian ───────────────
      # PUID=0 so the container can read/write these root-owned files. These are
      # container-only bind mounts, so the vault-to-github rsync (host-side) never
      # sees them — no risk of pushing settings/logs to GitHub. They DO replicate
      # via LiveSync to your private CouchDB.
      - /root/.claude/agents:/config/vault/Claude-Code/agents                       # custom sub-agents (rw)
      - /root/.claude/projects/-root/memory:/config/vault/Claude-Code/memory        # persistent memory notes (rw)
      - /root/.claude/settings.json:/config/vault/Claude-Code/settings.json         # global settings (rw)
      - /root/.claude/settings.local.json:/config/vault/Claude-Code/settings.local.json  # local settings (rw)
      - /root/.claude/statusline-command.sh:/config/vault/Claude-Code/statusline-command.sh  # statusline (rw)
      - /root/.claude/projects:/config/vault/Claude-Code/chat-logs:ro               # session transcripts (read-only)
    ports:
      - "127.0.0.1:3023:3000"        # local test only; public access is via the cloudflare tunnel (CF Access gated)
    networks:
      - drawbridge                   # public tunnel net; cloudflared reaches http://obsidian:3000
      - observatory                  # so promtail/cadvisor observe it

networks:
  drawbridge:
    external: true
  observatory:
    external: true
