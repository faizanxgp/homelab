services:
  postgres-automation:
    image: postgres:16
    container_name: postgres-automation
    restart: unless-stopped
    environment:
      POSTGRES_USER: automation
      POSTGRES_PASSWORD: ${AUTOMATION_DB_PASSWORD}
      POSTGRES_DB: automation
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks:
      - automation
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automation -d automation"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  automation:
    external: true
