services:
  automation-postgres:
    image: postgres:16
    container_name: automation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: automation
      POSTGRES_PASSWORD: ${AUTOMATION_DB_PASSWORD}
      POSTGRES_DB: automation
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks:
      - automation
      - observatory
      # drawbridge removed 2026-06-28: DB is internal-only. Schema work is done via the
      # db-viewer (pgweb) stack at /opt/homelab/utility/db-viewer, which bridges automation<->drawbridge.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automation -d automation"]
      interval: 10s
      timeout: 5s
      retries: 5

  automation-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: automation-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://automation:${AUTOMATION_DB_PASSWORD}@automation-postgres:5432/automation?sslmode=disable"
    depends_on:
      automation-postgres:
        condition: service_healthy
    networks:
      - observatory

networks:
  automation:
    external: true
  observatory:
    external: true
