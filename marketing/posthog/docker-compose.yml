# PostHog — self-hosted product analytics. Heavy stack: Postgres + Redis +
# ClickHouse + Kafka (KRaft) + MinIO object storage + web/worker/plugin-server.
# Part of the marketing stack. Defined but kept stopped — this one is the biggest
# RAM consumer in the repo; review carefully and size the box before `up`.
# Public (when enabled) via cloudflared at posthog.itproxima.com.
name: posthog
x-posthog-env: &posthog-env
  DATABASE_URL: "postgres://posthog:${POSTHOG_DB_PASSWORD}@posthog-db:5432/posthog"
  REDIS_URL: "redis://posthog-redis:6379/"
  CLICKHOUSE_HOST: posthog-clickhouse
  CLICKHOUSE_DATABASE: posthog
  CLICKHOUSE_SECURE: "false"
  CLICKHOUSE_VERIFY: "false"
  KAFKA_HOSTS: "posthog-kafka:9092"
  SECRET_KEY: "${POSTHOG_SECRET_KEY}"               # openssl rand -hex 32
  SITE_URL: "https://posthog.itproxima.com"
  DISABLE_SECURE_SSL_REDIRECT: "true"
  IS_BEHIND_PROXY: "true"
  OBJECT_STORAGE_ENABLED: "true"
  OBJECT_STORAGE_ENDPOINT: "http://posthog-objectstorage:9000"
  OBJECT_STORAGE_ACCESS_KEY_ID: "${POSTHOG_MINIO_USER}"
  OBJECT_STORAGE_SECRET_ACCESS_KEY: "${POSTHOG_MINIO_PASSWORD}"

services:
  posthog-web:
    image: posthog/posthog:latest
    container_name: posthog-web
    restart: unless-stopped
    command: ./bin/docker-server
    environment: *posthog-env
    depends_on:
      posthog-db: { condition: service_healthy }
      posthog-redis: { condition: service_healthy }
      posthog-clickhouse: { condition: service_healthy }
      posthog-kafka: { condition: service_started }
    ports:
      - "127.0.0.1:8418:8000"   # local test only; public via tunnel
    networks: [posthog-internal, marketing, drawbridge, observatory]

  posthog-worker:
    image: posthog/posthog:latest
    container_name: posthog-worker
    restart: unless-stopped
    command: ./bin/docker-worker-celery --with-scheduler
    environment: *posthog-env
    depends_on:
      posthog-web: { condition: service_started }
    networks: [posthog-internal, observatory]

  posthog-plugins:
    image: posthog/posthog:latest
    container_name: posthog-plugins
    restart: unless-stopped
    command: ./bin/plugin-server
    environment: *posthog-env
    depends_on:
      posthog-web: { condition: service_started }
    networks: [posthog-internal, observatory]

  posthog-db:
    image: postgres:16-alpine
    container_name: posthog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: "${POSTHOG_DB_PASSWORD}"
      POSTGRES_DB: posthog
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks: [posthog-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posthog -d posthog"]
      interval: 10s
      timeout: 3s
      retries: 10

  posthog-redis:
    image: redis:7-alpine
    container_name: posthog-redis
    restart: unless-stopped
    volumes:
      - ./volumes/redis:/data
    networks: [posthog-internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  posthog-clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: posthog-clickhouse
    restart: unless-stopped
    volumes:
      - ./volumes/clickhouse:/var/lib/clickhouse
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    networks: [posthog-internal, observatory]   # :9363 prometheus scraped on observatory
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  posthog-kafka:
    image: bitnami/kafka:3.7
    container_name: posthog-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@posthog-kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://posthog-kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - ./volumes/kafka:/bitnami/kafka
    networks: [posthog-internal]

  posthog-objectstorage:
    image: minio/minio:latest
    container_name: posthog-objectstorage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${POSTHOG_MINIO_USER}"
      MINIO_ROOT_PASSWORD: "${POSTHOG_MINIO_PASSWORD}"
    volumes:
      - ./volumes/minio:/data
    networks: [posthog-internal]

  posthog-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: posthog-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://posthog:${POSTHOG_DB_PASSWORD}@posthog-db:5432/posthog?sslmode=disable"
    depends_on:
      posthog-db: { condition: service_healthy }
    networks: [posthog-internal, observatory]

  posthog-redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: posthog-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://posthog-redis:6379"
    depends_on:
      posthog-redis: { condition: service_healthy }
    networks: [posthog-internal, observatory]

networks:
  posthog-internal:
    driver: bridge
  marketing:
    external: true
  drawbridge:
    external: true
  observatory:
    external: true
