# Metabase — self-hosted BI / dashboards (Postgres app DB).
# Part of the marketing stack. Defined but kept stopped (review before `up`).
# Public (when enabled) via cloudflared at metabase.itproxima.com.
name: metabase
services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    depends_on:
      metabase-db:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: "5432"
      MB_DB_USER: metabase
      MB_DB_PASS: "${METABASE_DB_PASSWORD}"
      MB_DB_HOST: metabase-db
      JAVA_TIMEZONE: Asia/Karachi
    ports:
      - "127.0.0.1:8413:3000"   # local test only; public via tunnel
    networks: [metabase-internal, marketing, drawbridge, observatory]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 12
      start_period: 90s

  metabase-db:
    image: postgres:17-alpine
    container_name: metabase-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: "${METABASE_DB_PASSWORD}"
      POSTGRES_DB: metabase
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks: [metabase-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase -d metabase"]
      interval: 10s
      timeout: 3s
      retries: 10

  metabase-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: metabase-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://metabase:${METABASE_DB_PASSWORD}@metabase-db:5432/metabase?sslmode=disable"
    depends_on:
      metabase-db:
        condition: service_healthy
    networks: [metabase-internal, observatory]

networks:
  metabase-internal:
    driver: bridge
  marketing:
    external: true
  drawbridge:
    external: true
  observatory:
    external: true
