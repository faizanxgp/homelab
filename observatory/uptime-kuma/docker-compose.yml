services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./volumes/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro   # "Docker Container" monitor type (Settings > Docker Hosts)
    networks:
      - observatory
      - drawbridge      # reachable via Cloudflare Tunnel at uptime.itproxima.com

networks:
  observatory:
    external: true
  drawbridge:
    external: true
