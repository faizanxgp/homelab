global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ---- Host & container level ----
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # ---- n8n application metrics (queue mode) ----
  - job_name: n8n
    metrics_path: /metrics
    static_configs:
      - targets: ['n8n-main:5678']
        labels: {instance: 'n8n-main'}
      - targets: ['n8n-worker:5678']
        labels: {instance: 'n8n-worker'}
      - targets: ['n8n-worker-2:5678']
        labels: {instance: 'n8n-worker-2'}
      - targets: ['n8n-worker-3:5678']
        labels: {instance: 'n8n-worker-3'}

  # ---- PostgreSQL exporters ----
  - job_name: postgres
    static_configs:
      - targets: ['n8n-postgres-exporter:9187']
        labels: {instance: 'n8n-postgres'}
      - targets: ['evo-postgres-exporter:9187']
        labels: {instance: 'evo-postgres'}
      - targets: ['automation-postgres-exporter:9187']
        labels: {instance: 'automation-postgres'}
      - targets: ['postiz-postgres-exporter:9187']
        labels: {instance: 'postiz-postgres'}
      - targets: ['temporal-postgres-exporter:9187']
        labels: {instance: 'temporal-postgres'}
      # marketing stack (targets DOWN until the stack is started)
      - targets: ['listmonk-postgres-exporter:9187']
        labels: {instance: 'listmonk-db'}
      - targets: ['umami-postgres-exporter:9187']
        labels: {instance: 'umami-db'}
      - targets: ['metabase-postgres-exporter:9187']
        labels: {instance: 'metabase-db'}
      - targets: ['typebot-postgres-exporter:9187']
        labels: {instance: 'typebot-db'}
      - targets: ['chatwoot-postgres-exporter:9187']
        labels: {instance: 'chatwoot-postgres'}
      - targets: ['plausible-postgres-exporter:9187']
        labels: {instance: 'plausible-db'}
      - targets: ['posthog-postgres-exporter:9187']
        labels: {instance: 'posthog-db'}

  # ---- Redis exporters ----
  - job_name: redis
    static_configs:
      - targets: ['n8n-redis-exporter:9121']
        labels: {instance: 'n8n-redis'}
      - targets: ['evo-redis-exporter:9121']
        labels: {instance: 'evo-redis'}
      - targets: ['textbee-redis-exporter:9121']
        labels: {instance: 'textbee-redis'}
      - targets: ['postiz-redis-exporter:9121']
        labels: {instance: 'postiz-redis'}
      # marketing stack (targets DOWN until the stack is started)
      - targets: ['chatwoot-redis-exporter:9121']
        labels: {instance: 'chatwoot-redis'}
      - targets: ['posthog-redis-exporter:9121']
        labels: {instance: 'posthog-redis'}

  # ---- MongoDB exporter ----
  - job_name: mongodb
    static_configs:
      - targets: ['textbee-mongo-exporter:9216']
        labels: {instance: 'textbee-mongo'}

  # ---- CouchDB exporter (Obsidian LiveSync backend) ----
  - job_name: couchdb
    static_configs:
      - targets: ['couchdb-exporter:9984']
        labels: {instance: 'couchdb'}

  # ---- Elasticsearch exporter (Temporal visibility store) ----
  - job_name: elasticsearch
    static_configs:
      - targets: ['temporal-es-exporter:9114']
        labels: {instance: 'temporal-es'}

  # ---- MySQL / MariaDB exporter (Matomo) — DOWN until marketing stack starts ----
  - job_name: mysql
    static_configs:
      - targets: ['matomo-db-exporter:9104']
        labels: {instance: 'matomo-db'}

  # ---- ClickHouse native metrics (Plausible + PostHog) — DOWN until started ----
  - job_name: clickhouse
    static_configs:
      - targets: ['plausible-events-db:9363']
        labels: {instance: 'plausible-clickhouse'}
      - targets: ['posthog-clickhouse:9363']
        labels: {instance: 'posthog-clickhouse'}

  # ---- Cloudflare Tunnel (cloudflared built-in metrics) ----
  - job_name: cloudflared
    static_configs:
      - targets: ['cloudflared:60123']
        labels: {instance: 'bobo-prime-tunnel'}

  # ---- Uptime Kuma (monitor up/down, response time, cert expiry) ----
  # API key lives in ./prometheus/secrets/kuma_api_key (gitignored); created in the Kuma UI.
  - job_name: uptime-kuma
    metrics_path: /metrics
    scheme: http
    basic_auth:
      username: prometheus
      password_file: /etc/prometheus/secrets/kuma_api_key
    static_configs:
      - targets: ['uptime-kuma:3001']
        labels: {instance: 'uptime-kuma'}
