# Dozzle — real-time Docker log viewer in the browser (read-only docker socket).
# Lives in the observatory (observability) stack. Defined but kept stopped.
# Public (when enabled) via cloudflared at dozzle.itproxima.com.
name: dozzle
services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_ENABLE_ACTIONS: "false"   # read-only; no start/stop/restart from the UI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:8888:8080"   # local test only; public via tunnel
    networks: [drawbridge, observatory]
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  drawbridge:
    external: true
  observatory:
    external: true
