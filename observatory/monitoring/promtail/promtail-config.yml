server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream

  # Host-side job logs (vault->github cron, rclone OneDrive runs, etc.) that aren't
  # containers. Tail files dropped into /var/log/homelab on the host.
  - job_name: homelab-host-jobs
    static_configs:
      - targets: [localhost]
        labels:
          job: homelab-jobs
          host: bobo-prime
          __path__: /var/log/homelab/*.log
