apiVersion: 1

# Drop any previously-provisioned copies so the fixed UIDs below can be assigned
# cleanly (Grafana cannot re-key an existing datasource in place).
deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
