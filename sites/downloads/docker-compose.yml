services:
  downloads:
    image: nginx:alpine
    container_name: downloads
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./files:/srv:ro          # public read-only file drop
    ports:
      - "127.0.0.1:3021:80"      # local test only; public access is via the cloudflare tunnel
    networks:
      - drawbridge               # the public tunnel network; cloudflared reaches http://downloads:80
      - observatory              # so cadvisor/promtail observe it
      - sites                          # grouped on the sites network

networks:
  drawbridge:
    external: true
  observatory:
    external: true
  sites:
    external: true
