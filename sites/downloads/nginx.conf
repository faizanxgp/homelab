server {
    listen 80;
    server_name _;
    root /srv;
    charset utf-8;

    # Health check for cloudflared / uptime monitoring.
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    # Pretty, browsable index of everything in the drop.
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # downloads.itproxima.com/apk  ->  force-saves the textbee APK.
    location = /apk {
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="textbee.apk"';
        add_header Cache-Control 'no-store';
        try_files /textbee.apk =503;
    }

    # downloads.itproxima.com/wa_qr1  ->  live auto-refreshing QR page (mian_one).
    # Bare path serves the HTML wrapper; the wrapper reloads wa_qr1.png itself.
    location = /wa_qr1 {
        default_type text/html;
        add_header Cache-Control 'no-store';
        try_files /wa_qr1.html =404;
    }

    # Never cache QR images so a refresh always pulls the freshest one.
    location ~* ^/wa_qr.*\.png$ {
        add_header Cache-Control 'no-store';
    }

    # Everything else: serve the file, otherwise show the autoindex listing.
    location / {
        try_files $uri $uri/ =404;
    }
}
