server {
    listen 80;
    server_name _;
    root /srv;

    # Health check for cloudflared / uptime monitoring.
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    # Any path force-downloads the latest textbee APK.
    # apk.itproxima.com  ->  saves textbee.apk to the phone.
    location / {
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="textbee.apk"';
        add_header Cache-Control 'no-store';
        try_files /textbee.apk =503;
    }
}
